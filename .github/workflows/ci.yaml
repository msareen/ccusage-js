name: CI

on:
  push:
  pull_request:

permissions: read-all

jobs:
  test:
    name: Typecheck, test & build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Create default Claude directories for tests
        run: |
          mkdir -p "$HOME/.claude/projects"
          mkdir -p "$HOME/.config/claude/projects"
      - name: Type-check
        run: cd apps/ccusage && bun run tsc --noEmit
      - name: Bun tests
        run: cd apps/ccusage && TZ=UTC bun test
      - name: Vitest
        run: TZ=UTC bun run vitest run
      - name: Build
        run: cd apps/ccusage && bun run build
