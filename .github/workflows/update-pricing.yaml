name: update pricing

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions: {}

jobs:
  update-pricing:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2
        with:
          bun-version: latest
      - name: Regenerate embedded LiteLLM pricing snapshot
        run: cd apps/ccusage && bun run embed:pricing
      - name: Create pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet; then
            echo "Pricing snapshot is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          gh auth setup-git

          branch="automation/litellm-pricing"
          git checkout -B "$branch"
          git add apps/ccusage/src/data/litellm-pricing.json
          git commit -m "chore(pricing): update LiteLLM snapshot"
          git push --force-with-lease origin "$branch"

          body="Updates the embedded LiteLLM pricing snapshot."

          if gh pr view "$branch" >/dev/null 2>&1; then
            printf '%s\n' "$body" | gh pr edit "$branch" --title "chore(pricing): update LiteLLM snapshot" --body-file -
          else
            printf '%s\n' "$body" | gh pr create --base main --head "$branch" --title "chore(pricing): update LiteLLM snapshot" --body-file -
          fi
